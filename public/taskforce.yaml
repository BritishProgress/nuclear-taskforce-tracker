      short: "Reinstate Model Provisions"
      long: "Reinstate the Infrastructure Planning (Model Provisions) (England and Wales) Order 2009"
    text: |
      MHCLG should legislate to reinstate the Model Provisions. These Model Provisions should include:
      a) Standard Requirements ensuring management plans are "substantially in accordance" with outline documents;
      b) Provisions enabling compulsory acquisition of rights for utility works;
      c) Provisions allowing variations that deliver environmentally better solutions;
      d) Provisions ensuring overlapping consents do not lead to enforcement action;
      e) Time periods for consultation and decision-making not exceeding 28 days (42 for protective provisions);
      f) Acceptable protective provisions for statutory undertakers; and
      g) Default provisions to be utilised where disputes exist.

      Statutory guidance should say these provisions should be accepted unless there is a fundamental and compelling reason not to.
