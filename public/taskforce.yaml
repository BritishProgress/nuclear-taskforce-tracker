      long: "Create more proportionality in the Environmental Impact Assessment (EIA) regime"
    text: |
      EIA Regulations should be amended to:
      a) Include a "principle of proportionality" which requires decision-makers to consider existing decisions (to discourage a ratcheting effect), and the extent to which outstanding matters will be addressed through other regulatory regimes. Only information necessary to determine the issue before them should be required.
      b) Allow relevant departments to issue binding statutory guidance requiring decision-makers to ask only for proportionate scoping, surveys and assessments.
