recommendations:
  - id: 1
    code: "R01"
    chapter_id: 5
    proposal_ids: [1]
    titles:
      short: "Provide HMG Strategic Steer"
      long: "Provide HMG Strategic Steer to the Nuclear Sector"
    text: |
      The Government should set a clear strategic direction to nuclear policy, ensuring alignment across departments, regulatory agencies and dutyholders and their supply chains. This steer should set a national priority, emphasise urgency, and balance safety with delivery.
    scope:
      sectors: ["civil", "defence"]
      domains:
        - leadership
        - strategic_direction
    ownership:
      primary_owner: "No. 10"
      co_owners: []
      key_regulators: []
    delivery_timeline:
      original_text: "End of January 2026"
      target_date: "2026-01-31"
      revised_target_date: null
      notes: null
    implementation_type:
      - strategic_direction
      - guidance
    dependencies:
      depends_on: []
      enables: [2, 3, 4, 5]
    overall_status:
      status: "completed"
      last_updated: "2026-03-13"
      confidence: "high"
      summary: "Completed. Government going further by legislating ONR strategic factors."
    updates:
      - date: "2025-12-01"
        status: "completed"
        tags: []
        title: "Prime Minister's strategic steer to the nuclear sector"
        description: "The Government completed the first recommendation of the Nuclear Regulatory Taskforce report by issuing a strategic steer to the nuclear sector."
        links:
          - title: "Prime Minister's Strategic Steer to the Nuclear Sector"
            url: "https://www.gov.uk/government/publications/prime-ministers-strategic-steer-to-the-nuclear-sector"
        source:
          type: "Policy Paper"
    notes: |
      First recommendation to be implemented. Sets the foundation for other reforms.

  - id: 2
    code: "R02"
    chapter_id: 5
    proposal_ids: [2]
    titles:
      short: "Establish Commission for Nuclear Regulation"
      long: "Establish a collective decision-making body for nuclear regulatory decisions"
    text: |
      The establishment of a Commission for Nuclear Regulation to formalise collective decision making and leadership for the sector going forward.

      The Commission should:
      - Comprise of five full-time members, presided over by the Chief Nuclear Inspector (CNI). In cases of conflict, a Deputy CNI, a new statutory role, would preside. There should be two Deputy CNIs: one each for civil and defence. Independent members would be appointed by the Prime Minister based on skill, experience and judgement;
      - Consolidate oversight and legal authority across all nuclear governance domains, safety, security, safeguards, environment, planning, and defence, into a single independent body; and
      - Be able to rapidly convene independent expert advice.
    scope:
      sectors: ["civil", "defence"]
      domains:
        - governance
        - regulatory_structure
    ownership:
      primary_owner: "Cabinet Office"
      co_owners: []
      key_regulators:
        - "ONR"
        - "Environment Agency"
    delivery_timeline:
      original_text: "End of 2027"
      target_date: "2027-12-31"
      revised_target_date: "2028-07-31"
      notes: "Govt response: Commission fully functioning by Summer 2028; lead regulator as interim"
    implementation_type:
      - primary_legislation
      - organisational_change
    dependencies:
      depends_on: [1]
      enables: []
    overall_status:
      status: "on_track"
      last_updated: "2026-03-13"
      confidence: "high"
      summary: "Accepted. Nuclear Commission by Summer 2028; lead regulator as interim."
    updates:
      - date: "2026-03-13"
        status: "on_track"
        tags: ["govt_response"]
        title: "Government Response: Nuclear Commission confirmed"
        description: |
          The Government will legislate to establish the UK's first Nuclear Commission, which is to be fully functioning by Summer 2028. In the interim, a lead regulator model will be implemented as a bridging measure. The Government will scope out the Commission's objectives, roles, and composition, broadly following the Taskforce's proposed structure. This is a clear acceptance of the recommendation with a defined timeline, though the Summer 2028 target is later than the Taskforce's end-of-2027 aspiration.
        source_key: "govt_response_2026"
        impact_on_overall:
          changes_confidence_to: "high"
          notes: "Clear commitment to legislate for Nuclear Commission with defined timeline."
    notes: |
      Major structural reform. Would consolidate decision-making currently fragmented across regulators.

  - id: 3
    code: "R03"
    chapter_id: 5
    proposal_ids: [2]
    titles:
      short: "Establish lead regulator model"
      long: "Establish a lead regulator model with ONR as default lead regulator"
    text: |
      We consider that the need to reform decision-making is urgent. In advance of the establishment of a Commission, a formal system of a lead regulator role should be set up between relevant regulators, such as the ONR, DNSR, and EA. The ONR should be designated as the default lead regulator for the nuclear sector. This should be done for significant projects in order to provide leadership and reduce regulatory complexity.
    scope:
      sectors: ["civil", "defence"]
      domains:
        - governance
        - regulatory_coordination
    ownership:
      primary_owner: "ONR"
      co_owners:
        - "Environment Agency"
        - "Other regulators"
      key_regulators:
        - "ONR"
        - "DNSR"
        - "Environment Agency"
    delivery_timeline:
      original_text: "March 2026"
      target_date: "2026-03-31"
      revised_target_date: null
      notes: "Interim measure pending Commission establishment"
    implementation_type:
      - guidance
      - organisational_change
    dependencies:
      depends_on: [1]
      enables: [2]
    overall_status:
      status: "on_track"
      last_updated: "2026-03-13"
      confidence: "high"
      summary: "Accepted. Lead regulator model in place by 31 March 2026; 'super six' formed."
    updates:
      - date: "2026-03-13"
        status: "on_track"
        tags: ["govt_response"]
        title: "Government Response: Lead regulator model on track"
        description: |
          The Government has already taken steps to implement this recommendation. ONR has written to other regulators to form a "super six" grouping of key nuclear regulators. The lead regulator model will be in place by 31 March 2026, meeting the original target date. The approach will cover both civil and defence sites on a site-based basis, which goes beyond the original scope. This is one of the most advanced recommendations in terms of delivery.
        source_key: "govt_response_2026"
        impact_on_overall:
          changes_confidence_to: "high"
          notes: "Lead regulator model already being implemented; on track for March 2026 deadline."
    notes: |
      Interim measure to be implemented before Commission for Nuclear Regulation is established.

  - id: 4
    code: "R04"
    chapter_id: 5
    proposal_ids: [2]
    titles:
      short: "Simplify nuclear regulatory landscape"
      long: "Simplify the nuclear regulatory landscape by consolidating nuclear regulatory functions"
    text: |
      There should be a commitment, so far as possible, to only have one regulator per hazard type or regulatory function.
      - Merge DNSR and ONR, generating a specific defence enclave.
      - Consideration should be given to transferring other regulatory responsibilities for duplicative entities into a single regulator, for example regulation of radioactive substances or nuclear security.
      - The ONR should be given concurrent vires for radiological substances as the EA.
    scope:
      sectors: ["civil", "defence"]
      domains:
        - regulatory_structure
        - organisational_change
    ownership:
      primary_owner: "Cabinet Office"
      co_owners:
        - "MOD"
        - "DESNZ"
      key_regulators:
        - "ONR"
        - "DNSR"
    delivery_timeline:
      original_text: "March 2026"
      target_date: "2026-03-31"
      revised_target_date: "2028-12-31"
      notes: "Govt response: Initial changes Autumn 2026, full merger by end of 2028"
    implementation_type:
      - primary_legislation
      - organisational_change
    dependencies:
      depends_on: [1]
      enables: []
    overall_status:
      status: "on_track"
      last_updated: "2026-03-13"
      confidence: "high"
      summary: "Accepted. ONR-DNSR merger: initial changes Autumn 2026, full merger end 2028."
    updates:
      - date: "2026-03-13"
        status: "on_track"
        tags: ["govt_response"]
        title: "Government Response: ONR-DNSR merger confirmed"
        description: |
          The Government will consolidate the nuclear regulatory landscape by merging ONR and DNSR, directly following the Taskforce recommendation. Initial changes will be implemented by Autumn 2026 with full merger completed by the end of 2028. The Government will also strengthen collaboration between the Environment Agency and ONR. This is a significant structural reform that addresses the fragmentation the Taskforce identified, though the full merger timeline extends beyond the original March 2026 target.
        source_key: "govt_response_2026"
        impact_on_overall:
          changes_confidence_to: "high"
          notes: "Clear commitment to ONR-DNSR merger with phased timeline."
    notes: |
      Proposes merger of DNSR and ONR. Legislative and treaty issues to resolve.

  - id: 5
    code: "R05"
    chapter_id: 5
    proposal_ids: [3]
    titles:
      short: "Reset safety case development"
      long: "Reset safety case development to eliminate duplication and embed simplicity"
    text: |
      Reset the approach to safety case development and assessment to eliminate duplication and embed simplicity. This should aim to shorten safety cases overall and return them to their original purpose as documents for use by the dutyholder to support operation.

      The defence sector should realign with the Three Lines of Defence (3LoD) model in accordance with HMG's Management of Risk – Principles and Concepts. The first line undertaking the majority of technical review, the second line providing process assurance and targeted assessment of high-risk areas, and the third independent line providing assurance that management arrangements and governance frameworks operate effectively. The regulator should exist external to the 3LoD structure.
    scope:
      sectors: ["civil", "defence"]
      domains:
        - safety_case
        - risk_management
    ownership:
      primary_owner: "Dutyholders"
      co_owners:
        - "Regulators"
      key_regulators:
        - "ONR"
        - "DNSR"
    delivery_timeline:
      original_text: "March 2026"
      target_date: "2026-03-31"
      revised_target_date: "2027-07-31"
      notes: "Govt response: Strategic direction by Summer 2026, fully embedded by Summer 2027"
    implementation_type:
      - guidance
      - culture_change
    dependencies:
      depends_on: [1]
      enables: []
    overall_status:
      status: "on_track"
      last_updated: "2026-03-13"
      confidence: "high"
      summary: "Accepted. Proportionality Action Plan: strategic direction by Summer 2026, full embedding by Summer 2027."
    updates:
      - date: "2026-03-13"
        status: "on_track"
        tags: ["govt_response"]
        title: "Government Response: Proportionality Action Plan for safety cases"
        description: |
          The Government is implementing a Proportionality Action Plan to reset safety case development. Strategic direction will be agreed by the end of Summer 2026, with new methodologies fully embedded by Summer 2027. Oversight will be provided through the Nuclear Standards Forum and the Nuclear Regulatory Implementation Programme (NRIP). The approach aligns with the Taskforce recommendation to eliminate duplication and embed simplicity in the safety case regime.
        source_key: "govt_response_2026"
        impact_on_overall:
          changes_confidence_to: "high"
          notes: "Proportionality Action Plan with clear milestones and oversight mechanisms."
    notes: |
      Aims to simplify and shorten safety cases. Defence sector should realign with 3LoD model.

  - id: 6
    code: "R06"
    chapter_id: 6
    proposal_ids: [3]
    titles:
      short: "Define tolerability of risk"
      long: "Government should define the tolerability of risk for nuclear"
    text: |
      The Government should take responsibility for defining the Tolerability of Risk for the nuclear sector. In doing this, the Government should consider the modern state of the nuclear sector, and the societal demand for its outputs across energy, decommissioning and defence. This should be clearly communicated to regulators and periodically reviewed.

      The Government should make a direction to the ONR under section 92 of the Energy Act 2013 and to the EA section 40 of the Environment Act 1995 so that, in exercising their functions, risks at or below broadly acceptable levels are deemed to be ALARP and ALARA unless there are strong and compelling reasons to the contrary.

      This direction and definition should form the basis of the revision of the guidance in recommendation 7.
    scope:
      sectors: ["civil", "defence"]
      domains:
        - risk_management
        - policy
    ownership:
      primary_owner: "DESNZ"
      co_owners:
        - "DWP"
        - "MOD"
      key_regulators:
        - "ONR"
        - "Environment Agency"
    delivery_timeline:
      original_text: "June 2026"
      target_date: "2026-06-30"
      revised_target_date: null
      notes: null
    implementation_type:
      - secondary_legislation
      - guidance
    dependencies:
      depends_on: [1]
      enables: [7, 8]
    overall_status:
      status: "on_track"
      last_updated: "2026-03-13"
      confidence: "high"
      summary: "Accepted. Expert panel examining ToR framework, reporting by June 2026."
    updates:
      - date: "2026-03-13"
        status: "on_track"
        tags: ["govt_response"]
